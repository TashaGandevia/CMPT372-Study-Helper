<!doctype html>
<!--
  Single HTML entry point for the app.
  Vite injects the bundled scripts here; React mounts into <div id="root">.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full-Stack Quest</title>
  </head>
  <body>
    <!-- React renders the entire app into this node (see src/main.jsx) -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
